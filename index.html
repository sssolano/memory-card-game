<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Simple Balatro memory game</title>
</head>
<body>
    <video autoplay muted loop id="background-video">
        <source src="/img/background-game.mp4" type="video/mp4">
    </video>
    <!-- aqui ponemos las instrucciones estilo balatro -->
    <div id="instructions-div">
        <!-- instrucciones sobre que es el juego -->
        <div id="def-game-div">
            <h1>How to play</h1>
            <div id="white-background-def">
                <p id="definition-text">This is a <a class="text-green">memory card game</a></p>
            </div>
        </div>
        <div id="def-lives-div">
            <h1>Your lives</h1>
            <div id="white-background-lives">
                <p>The red box represents <a class="text-red">the amount of lives left</a></p>
            </div>
        </div>
        <div id="lives-box">
            <a id="live-text">Lives left: <span id="text-lives"></span></a>
        </div>
    </div>
    <div id="cards-div">
        <ul id="card-element" hidden>
        </ul>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
